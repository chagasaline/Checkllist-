<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist – Teste de Funcioinalidade</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* (estilos mantidos iguais aos anteriores) */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
        body { background:#f0f2f5; padding:20px; min-height:100vh; display:flex; justify-content:center; }
        .container { max-width:1100px; width:100%; background:#fff; border-radius:16px; box-shadow:0 10px 40px rgba(0,0,0,0.08); padding:30px; }
        h1 { font-size:24px; color:#1a1a2e; margin-bottom:4px; }
        .subtitle { color:#6b7280; font-size:14px; margin-bottom:20px; }
        .toolbar { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; align-items:center; }
        .toolbar input, .toolbar select { padding:8px 14px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; background:#f9fafb; flex:1 1 180px; }
        .toolbar input:focus, .toolbar select:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
        .btn { padding:8px 18px; border:none; border-radius:8px; font-weight:600; font-size:13px; cursor:pointer; transition:all 0.2s; white-space:nowrap; display:inline-flex; align-items:center; gap:6px; }
        .btn-primary { background:#3b82f6; color:#fff; }
        .btn-primary:hover { background:#2563eb; }
        .btn-success { background:#22c55e; color:#fff; }
        .btn-success:hover { background:#16a34a; }
        .btn-outline { background:transparent; border:1.5px solid #d1d5db; color:#374151; }
        .btn-outline:hover { background:#f3f4f6; }
        .btn-export { background:#8b5cf6; color:#fff; }
        .btn-export:hover { background:#7c3aed; }
        .btn-pdf { background:#dc2626; color:#fff; }
        .btn-pdf:hover { background:#b91c1c; }
        .btn-excel { background:#217346; color:#fff; }
        .btn-excel:hover { background:#1a5c38; }
        .btn-ppt { background:#d24726; color:#fff; }
        .btn-ppt:hover { background:#b33c1f; }
        .btn-image { background:#f59e0b; color:#fff; }
        .btn-image:hover { background:#d97706; }
        .btn-sm { padding:4px 10px; font-size:12px; }
        .btn-danger { background:#ef4444; color:#fff; }
        .btn-danger:hover { background:#dc2626; }

        .stats { display:flex; gap:20px; flex-wrap:wrap; padding:12px 16px; background:#f8fafc; border-radius:10px; margin-bottom:20px; border:1px solid #e5e7eb; }
        .stats span { font-size:14px; color:#4b5563; }
        .stats strong { color:#1a1a2e; }

        .checklist { display:flex; flex-direction:column; gap:8px; margin-top:10px; }
        .checklist-item { display:flex; flex-direction:column; padding:12px 16px; background:#f9fafb; border-radius:12px; border:1px solid #e5e7eb; transition:all 0.15s; gap:8px; }
        .checklist-item:hover { background:#f3f4f6; }
        .checklist-item.done { background:#f0fdf4; border-color:#bbf7d0; }
        .checklist-item.done .item-text { text-decoration:line-through; color:#6b7280; }

        .item-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .item-row input[type="checkbox"] { width:20px; height:20px; accent-color:#22c55e; cursor:pointer; flex-shrink:0; }
        .item-text { flex:1; font-size:15px; color:#1f2937; }
        .item-category { font-size:11px; background:#e5e7eb; padding:2px 10px; border-radius:12px; color:#4b5563; white-space:nowrap; }
        .item-obs { font-size:13px; color:#6b7280; background:#fff; border:1px solid #e5e7eb; border-radius:6px; padding:4px 10px; min-width:120px; flex:1 1 150px; }
        .item-obs:focus { outline:none; border-color:#3b82f6; }
        .btn-remove { background:none; border:none; color:#9ca3af; font-size:18px; cursor:pointer; padding:0 4px; transition:color 0.2s; }
        .btn-remove:hover { color:#ef4444; }

        .item-images { display:flex; flex-wrap:wrap; gap:10px; padding:6px 0 0 32px; }
        .image-card { position:relative; border:1px solid #d1d5db; border-radius:8px; padding:6px; background:#fff; max-width:120px; }
        .image-card img { width:100%; height:80px; object-fit:cover; border-radius:4px; }
        .image-card .caption { font-size:10px; color:#4b5563; text-align:center; margin-top:2px; }
        .image-card .btn-remove-img { position:absolute; top:-6px; right:-6px; background:#ef4444; color:#fff; border:none; border-radius:50%; width:18px; height:18px; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .image-card .btn-remove-img:hover { background:#dc2626; }

        .add-image-form { display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding-left:32px; }
        .add-image-form input[type="file"] { display:none; }
        .add-image-form select, .add-image-form input[type="text"] { padding:4px 8px; border:1px solid #d1d5db; border-radius:6px; font-size:12px; background:#fff; }

        .add-item-form { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; padding:16px 0; border-top:1px solid #e5e7eb; }
        .add-item-form input, .add-item-form select { padding:8px 14px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; background:#f9fafb; flex:1 1 160px; }
        .add-item-form input:focus, .add-item-form select:focus { outline:none; border-color:#3b82f6; }

        .empty-state { text-align:center; padding:40px 20px; color:#9ca3af; }
        .empty-state .icon { font-size:48px; margin-bottom:12px; }

        .footer-actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:20px; padding-top:16px; border-top:1px solid #e5e7eb; justify-content:space-between; align-items:center; }
        .footer-actions .left, .footer-actions .right { display:flex; gap:8px; flex-wrap:wrap; }

        @media (max-width:640px) {
            .container { padding:16px; }
            .item-row { flex-wrap:wrap; }
            .item-obs { min-width:100px; flex:1; }
            .toolbar { flex-direction:column; align-items:stretch; }
            .footer-actions { flex-direction:column; align-items:stretch; }
            .footer-actions .left, .footer-actions .right { justify-content:center; }
            .image-card { max-width:80px; }
            .image-card img { height:60px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>📋 Checklist – Teste de funcionalidade do sistema </h1>
    <p class="subtitle">Verificação com imagens (antes/depois) – compartilhe em Word, Excel, PDF ou PowerPoint</p>

    <div class="toolbar">
        <input type="text" id="checklistTitle" placeholder="Título do checklist" value="Auditoria – ServiceNow Knowledge Center">
        <input type="text" id="projectName" placeholder="Nome do projeto" value="ServiceNow">
        <button class="btn btn-primary" onclick="addItem()">➕ Adicionar Item</button>
        <button class="btn btn-outline" onclick="clearAll()">🗑 Limpar</button>
    </div>

    <div class="stats" id="stats">
        <span>📦 <strong id="totalItems">0</strong> itens</span>
        <span>✅ <strong id="doneItems">0</strong> concluídos</span>
        <span>⏳ <strong id="pendingItems">0</strong> pendentes</span>
        <span>📊 <strong id="progressPercent">0%</strong> concluído</span>
    </div>

    <div id="checklistContainer" class="checklist">
        <div class="empty-state">
            <div class="icon">📝</div>
            <p>Nenhum item adicionado.<br>Use o campo acima para criar seu checklist.</p>
        </div>
    </div>

    <div class="add-item-form">
        <input type="text" id="newItemDesc" placeholder="Descrição do item...">
        <input type="text" id="newItemCategory" placeholder="Categoria (ex: Artigo, Categoria)">
        <select id="newItemStatus">
            <option value="pending">Pendente</option>
            <option value="done">Concluído</option>
        </select>
        <button class="btn btn-success" onclick="addItem()">➕ Adicionar</button>
    </div>

    <div class="footer-actions">
        <div class="left">
            <button class="btn btn-export" onclick="exportWord()">📄 Word</button>
            <button class="btn btn-excel" onclick="exportExcel()">📊 Excel</button>
            <button class="btn btn-pdf" onclick="exportPDF()">📑 PDF</button>
            <button class="btn btn-ppt" onclick="exportPPT()">📽️ PowerPoint</button>
        </div>
        <div class="right"></div>
    </div>
</div>

<script>
    // ============================================================
    //  ESTADO (mesmo de antes)
    // ============================================================
    let items = [];
    let nextId = 1;
    let nextImgId = 1;

    const container = document.getElementById('checklistContainer');
    const totalSpan = document.getElementById('totalItems');
    const doneSpan = document.getElementById('doneItems');
    const pendingSpan = document.getElementById('pendingItems');
    const progressSpan = document.getElementById('progressPercent');
    const titleInput = document.getElementById('checklistTitle');
    const projectInput = document.getElementById('projectName');

    // ============================================================
    //  PERSISTÊNCIA
    // ============================================================
    function saveState() {
        localStorage.setItem('checklistData', JSON.stringify({
            items, nextId, nextImgId,
            title: titleInput.value,
            project: projectInput.value
        }));
    }

    function loadState() {
        const raw = localStorage.getItem('checklistData');
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            items = data.items || [];
            nextId = data.nextId || 1;
            nextImgId = data.nextImgId || 1;
            titleInput.value = data.title || 'Auditoria – ServiceNow Knowledge Center';
            projectInput.value = data.project || 'ServiceNow';
            return true;
        } catch { return false; }
    }

    // ============================================================
    //  RENDER (mesmo de antes)
    // ============================================================
    function render() {
        const total = items.length;
        const done = items.filter(i => i.status === 'done').length;
        const pending = total - done;
        const percent = total === 0 ? 0 : Math.round((done / total) * 100);

        totalSpan.textContent = total;
        doneSpan.textContent = done;
        pendingSpan.textContent = pending;
        progressSpan.textContent = percent + '%';

        if (total === 0) {
            container.innerHTML = `<div class="empty-state"><div class="icon">📝</div><p>Nenhum item adicionado.<br>Use o campo acima para criar seu checklist.</p></div>`;
            return;
        }

        let html = '';
        items.forEach((item) => {
            const checked = item.status === 'done' ? 'checked' : '';
            const doneClass = item.status === 'done' ? 'done' : '';
            const imagesHtml = (item.images || []).map(img => `
                <div class="image-card">
                    <img src="${img.data}" alt="${img.caption || 'Imagem'}">
                    <div class="caption">${escapeHtml(img.caption || '')}</div>
                    <button class="btn-remove-img" onclick="removeImage(${item.id}, ${img.id})">✕</button>
                </div>
            `).join('');

            html += `
                <div class="checklist-item ${doneClass}" data-id="${item.id}">
                    <div class="item-row">
                        <input type="checkbox" ${checked} onchange="toggleItem(${item.id})">
                        <span class="item-text">${escapeHtml(item.description)}</span>
                        <span class="item-category">${escapeHtml(item.category || 'Geral')}</span>
                        <input class="item-obs" type="text" placeholder="Observação..." value="${escapeHtml(item.obs || '')}" onchange="updateObs(${item.id}, this.value)">
                        <button class="btn btn-image btn-sm" onclick="triggerImageUpload(${item.id})">📸 Imagem</button>
                        <button class="btn-remove" onclick="removeItem(${item.id})" title="Remover">✕</button>
                    </div>
                    ${imagesHtml ? `<div class="item-images">${imagesHtml}</div>` : ''}
                    <div class="add-image-form" id="imgForm_${item.id}" style="display:none;">
                        <input type="file" accept="image/*" onchange="handleImageUpload(event, ${item.id})">
                        <select id="imgCaption_${item.id}">
                            <option value="Antes">Antes</option>
                            <option value="Depois">Depois</option>
                            <option value="Comparação">Comparação</option>
                            <option value="Outro">Outro</option>
                        </select>
                        <input type="text" id="imgObs_${item.id}" placeholder="Descrição (opcional)" style="flex:1; min-width:100px;">
                        <button class="btn btn-success btn-sm" onclick="finalizeImageUpload(${item.id})">✔ Adicionar</button>
                        <button class="btn btn-outline btn-sm" onclick="cancelImageUpload(${item.id})">Cancelar</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        saveState();
    }

    // ============================================================
    //  OPERAÇÕES (mesmo de antes)
    // ============================================================
    function addItem() {
        const desc = document.getElementById('newItemDesc').value.trim();
        if (!desc) { alert('Digite uma descrição para o item.'); return; }
        items.push({
            id: nextId++,
            description: desc,
            category: document.getElementById('newItemCategory').value.trim() || 'Geral',
            status: document.getElementById('newItemStatus').value,
            obs: '',
            images: []
        });
        document.getElementById('newItemDesc').value = '';
        document.getElementById('newItemCategory').value = '';
        document.getElementById('newItemStatus').value = 'pending';
        render();
    }

    function toggleItem(id) {
        const item = items.find(i => i.id === id);
        if (!item) return;
        item.status = item.status === 'done' ? 'pending' : 'done';
        render();
    }

    function updateObs(id, value) {
        const item = items.find(i => i.id === id);
        if (!item) return;
        item.obs = value;
        saveState();
    }

    function removeItem(id) {
        if (!confirm('Remover este item?')) return;
        items = items.filter(i => i.id !== id);
        render();
    }

    function clearAll() {
        if (!confirm('Limpar todos os itens?')) return;
        items = [];
        nextId = 1;
        nextImgId = 1;
        render();
    }

    // ============================================================
    //  IMAGENS (mesmo de antes)
    // ============================================================
    let pendingImageData = {};

    function triggerImageUpload(itemId) {
        const form = document.getElementById(`imgForm_${itemId}`);
        if (form.style.display === 'none') {
            form.style.display = 'flex';
            form.querySelector('input[type="file"]').click();
        } else {
            form.style.display = 'none';
            delete pendingImageData[itemId];
            const preview = document.getElementById(`preview_${itemId}`);
            if (preview) preview.remove();
            form.querySelector('input[type="file"]').value = '';
            document.getElementById(`imgObs_${itemId}`).value = '';
        }
    }

    function handleImageUpload(event, itemId) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            pendingImageData[itemId] = { data: e.target.result, name: file.name };
            const form = document.getElementById(`imgForm_${itemId}`);
            let preview = document.getElementById(`preview_${itemId}`);
            if (!preview) {
                preview = document.createElement('div');
                preview.id = `preview_${itemId}`;
                form.prepend(preview);
            }
            preview.innerHTML = `<img src="${e.target.result}" style="max-height:60px; border-radius:4px; border:1px solid #ddd;">`;
        };
        reader.readAsDataURL(file);
    }

    function finalizeImageUpload(itemId) {
        const data = pendingImageData[itemId];
        if (!data) { alert('Selecione uma imagem primeiro.'); return; }
        const item = items.find(i => i.id === itemId);
        if (!item) return;
        const caption = document.getElementById(`imgCaption_${itemId}`).value;
        const obs = document.getElementById(`imgObs_${itemId}`).value.trim();
        item.images.push({
            id: nextImgId++,
            data: data.data,
            name: data.name,
            caption: caption + (obs ? ` - ${obs}` : '')
        });
        delete pendingImageData[itemId];
        const form = document.getElementById(`imgForm_${itemId}`);
        form.style.display = 'none';
        const preview = document.getElementById(`preview_${itemId}`);
        if (preview) preview.remove();
        form.querySelector('input[type="file"]').value = '';
        document.getElementById(`imgObs_${itemId}`).value = '';
        render();
    }

    function cancelImageUpload(itemId) {
        delete pendingImageData[itemId];
        const form = document.getElementById(`imgForm_${itemId}`);
        form.style.display = 'none';
        const preview = document.getElementById(`preview_${itemId}`);
        if (preview) preview.remove();
        form.querySelector('input[type="file"]').value = '';
        document.getElementById(`imgObs_${itemId}`).value = '';
    }

    function removeImage(itemId, imgId) {
        const item = items.find(i => i.id === itemId);
        if (!item) return;
        if (!confirm('Remover esta imagem?')) return;
        item.images = item.images.filter(img => img.id !== imgId);
        render();
    }

    // ============================================================
    //  CARREGAR EXEMPLO
    // ============================================================
    function loadExample() {
        items = [
            { id: nextId++, description: 'Artigo possui título claro e objetivo', category: 'Artigo', status: 'pending', obs: '', images: [] },
            { id: nextId++, description: 'Categoria e subcategoria corretas', category: 'Categoria', status: 'pending', obs: '', images: [] },
            { id: nextId++, description: 'Permissões configuradas (público/privado/restrito)', category: 'Permissão', status: 'pending', obs: '', images: [] },
            { id: nextId++, description: 'Metadados preenchidos: autor, data de criação, atualização', category: 'Metadados', status: 'pending', obs: '', images: [] },
            { id: nextId++, description: 'Conteúdo relevante e atualizado', category: 'Conteúdo', status: 'pending', obs: '', images: [] },
            { id: nextId++, description: 'Palavras-chave e tags configuradas', category: 'SEO', status: 'pending', obs: '', images: [] },
            { id: nextId++, description: 'Versão do documento correta (controle de versão)', category: 'Versão', status: 'pending', obs: '', images: [] },
            { id: nextId++, description: 'Processo de aprovação definido', category: 'Processo', status: 'pending', obs: '', images: [] },
            { id: nextId++, description: 'Feedback dos usuários monitorado', category: 'Feedback', status: 'pending', obs: '', images: [] },
            { id: nextId++, description: 'Links internos funcionando', category: 'Integração', status: 'pending', obs: '', images: [] },
        ];
        render();
    }

    // ============================================================
    //  EXPORTAÇÃO WORD (mesmo de antes)
    // ============================================================
    function exportWord() {
        if (items.length === 0) { alert('Adicione itens ao checklist antes de exportar.'); return; }
        try {
            const title = escapeHtml(titleInput.value || 'Checklist ServiceNow');
            const project = escapeHtml(projectInput.value || '');
            const total = items.length;
            const done = items.filter(i => i.status === 'done').length;
            const percent = Math.round((done / total) * 100);
            const now = new Date().toLocaleString('pt-BR');

            let rowsHtml = items.map((item, i) => {
                const statusText = item.status === 'done' ? '✅ Concluído' : '⏳ Pendente';
                const statusColor = item.status === 'done' ? '#22c55e' : '#eab308';
                const bgColor = item.status === 'done' ? '#f0fdf4' : '#fefce8';
                const imagesHtml = (item.images || []).map(img => `
                    <div style="display:inline-block; margin:4px; text-align:center; border:1px solid #e5e7eb; border-radius:6px; padding:4px; background:#f9fafb; max-width:120px;">
                        <img src="${img.data}" style="max-height:60px; max-width:100px; border-radius:4px; display:block; margin:0 auto;">
                        <div style="font-size:9px; color:#4b5563; margin-top:2px;">${escapeHtml(img.caption || '')}</div>
                    </div>
                `).join('');
                return `
                    <tr style="background-color:${bgColor};">
                        <td style="padding:8px 12px; border:1px solid #d1d5db; text-align:center; font-weight:600;">${i+1}</td>
                        <td style="padding:8px 12px; border:1px solid #d1d5db;">${escapeHtml(item.description)}</td>
                        <td style="padding:8px 12px; border:1px solid #d1d5db; text-align:center;"><span style="background:#e5e7eb; padding:2px 10px; border-radius:12px; font-size:11px;">${escapeHtml(item.category || 'Geral')}</span></td>
                        <td style="padding:8px 12px; border:1px solid #d1d5db; text-align:center;"><span style="color:${statusColor}; font-weight:600;">${statusText}</span></td>
                        <td style="padding:8px 12px; border:1px solid #d1d5db;">${escapeHtml(item.obs || '')}</td>
                        <td style="padding:8px 12px; border:1px solid #d1d5db; text-align:center;">${imagesHtml || '—'}</td>
                    </tr>
                `;
            }).join('');

            const html = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' 
                  xmlns:w='urn:schemas-microsoft-com:office:word' 
                  xmlns='http://www.w3.org/TR/REC-html40'>
            <head>
                <meta charset="utf-8">
                <title>Checklist</title>
                <style>
                    body { font-family: 'Segoe UI', Arial, sans-serif; padding: 30px; background:#fff; }
                    .header { text-align:center; border-bottom:3px solid #8b5cf6; padding-bottom:15px; margin-bottom:20px; }
                    h1 { font-size:26px; color:#1a1a2e; margin:0; letter-spacing:1px; }
                    .sub { font-size:16px; color:#6b7280; margin:4px 0; }
                    .summary { background:#f8fafc; border-radius:10px; padding:15px 20px; margin:20px 0; border:1px solid #e5e7eb; text-align:center; }
                    .summary strong { font-size:18px; color:#1a1a2e; }
                    .badge { display:inline-block; padding:4px 16px; border-radius:20px; font-weight:bold; margin:0 4px; }
                    .badge-success { background:#22c55e; color:#fff; }
                    .badge-pending { background:#eab308; color:#fff; }
                    table { width:100%; border-collapse:collapse; font-size:13px; margin:15px 0; }
                    th { background:#8b5cf6; color:#fff; padding:10px 12px; border:1px solid #7c3aed; text-align:center; font-weight:600; }
                    td { padding:8px 12px; border:1px solid #d1d5db; vertical-align:middle; }
                    .footer { text-align:center; margin-top:30px; padding-top:15px; border-top:1px solid #e5e7eb; color:#9ca3af; font-size:12px; }
                </style>
            </head>
            <body>
                <div class="header">
                    <h1>📋 ${title}</h1>
                    <div class="sub">Projeto: ${project}</div>
                </div>
                <div class="summary">
                    <strong>Resumo:</strong> 
                    <span class="badge badge-success">✅ ${done} Concluídos</span>
                    <span class="badge badge-pending">⏳ ${total - done} Pendentes</span>
                    <span style="font-size:16px;">• ${percent}% concluído</span>
                </div>
                <table>
                    <thead><tr>
                        <th style="width:5%;">#</th>
                        <th style="width:25%;">Item</th>
                        <th style="width:15%;">Categoria</th>
                        <th style="width:15%;">Status</th>
                        <th style="width:20%;">Observação</th>
                        <th style="width:20%;">Imagens</th>
                    </tr></thead>
                    <tbody>${rowsHtml}</tbody>
                </table>
                <div class="footer">Gerado em ${now} • Checklist ServiceNow Knowledge Center</div>
            </body>
            </html>
            `;

            const blob = new Blob([html], { type: 'application/msword' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${title.replace(/[^a-z0-9]/gi, '_')}.doc`;
            document.body.appendChild(link);
            link.click();

    // ============================================================
    //  EXPORTAÇÃO EXCEL (mesmo de antes)
    // ============================================================
    function exportExcel() {
        if (items.length === 0) { alert('Adicione itens ao checklist antes de exportar.'); return; }
        try {
            const title = escapeHtml(titleInput.value || 'Checklist ServiceNow');
            const project = escapeHtml(projectInput.value || '');
            const total = items.length;
            const done = items.filter(i => i.status === 'done').length;
            const percent = Math.round((done / total) * 100);
            const now = new Date().toLocaleString('pt-BR');

            let rowsHtml = items.map((item, i) => {
                const statusText = item.status === 'done' ? 'Concluído' : 'Pendente';
                const statusColor = item.status === 'done' ? '#22c55e' : '#eab308';
                let imgCells = '';
                if (item.images && item.images.length > 0) {
                    imgCells = item.images.map(img => `
                        <div style="display:inline-block; margin:2px; text-align:center; border:1px solid #e5e7eb; border-radius:4px; padding:3px; background:#f9fafb; max-width:100px;">
                            <img src="${img.data}" style="max-height:45px; max-width:80px; border-radius:3px; display:block; margin:0 auto;">
                            <div style="font-size:8px; color:#4b5563;">${escapeHtml(img.caption || '')}</div>
                        </div>
                    `).join('');
                } else {
                    imgCells = '—';
                }
                return `
                    <tr>
                        <td style="padding:5px 8px; border:1px solid #ccc; text-align:center; font-weight:bold;">${i+1}</td>
                        <td style="padding:5px 8px; border:1px solid #ccc;">${escapeHtml(item.description)}</td>
                        <td style="padding:5px 8px; border:1px solid #ccc; text-align:center;">${escapeHtml(item.category || 'Geral')}</td>

                        <td style="padding:5px 8px; border:1px solid #ccc;">${escapeHtml(item.obs || '')}</td>
                        <td style="padding:5px 8px; border:1px solid #ccc; text-align:center;">${imgCells}</td>
                    </tr>
                `;
            }).join('');

            const html = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' 
                  xmlns:x='urn:schemas-microsoft-com:office:excel' 
                  xmlns='http://www.w3.org/TR/REC-html40'>
            <head>
                <meta charset="utf-8">
                <style>
                    body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; }
                    h1 { text-align:center; color:#1a1a2e; font-size:20px; margin:0; }
                    .sub { text-align:center; color:#6b7280; font-size:14px; margin:2px 0 15px; }
                    .summary { text-align:center; font-size:14px; margin:10px 0 15px; padding:10px; background:#f8fafc; border-radius:8px; }
                    table { width:100%; border-collapse:collapse; font-size:12px; }

                    td { padding:5px 8px; border:1px solid #ccc; vertical-align:middle; }
                    .footer { text-align:center; margin-top:20px; padding-top:10px; border-top:1px solid #e5e7eb; color:#9ca3af; font-size:11px; }
                </style>
            </head>
            <body>
                <h1>📋 ${title}</h1>
                <div class="sub">Projeto: ${project}</div>
                <div class="summary">
                    <strong>Resumo:</strong> ${done} Concluídos • ${total - done} Pendentes • ${percent}% concluído
                </div>
                <table>
                    <thead><tr>
                        <th>#</th>
                        <th>Item</th>
                        <th>Categoria</th>
                        <th>Status</th>
                        <th>Observação</th>
                        <th>Imagens</th>
                    </tr></thead>
                    <tbody>${rowsHtml}</tbody>
                </table>
                <div class="footer">Gerado em ${now}</div>

            </html>

            const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${title.replace(/[^a-z0-9]/gi, '_')}.xls`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(link.href), 5000);

            alert('Erro ao exportar Excel: ' + e.message);

                <span style="display:inline-block; padding:4px 16px; border-radius:20px; font-weight:bold; background:#eab308; color:#fff; margin:0 4px;">⏳ ${total - done} Pendentes</span>
                <span style="font-size:16px;">• ${percent}% concluído</span>
            </div>
            <table style="width:100%; border-collapse:collapse; font-size:13px; margin:15px 0;">

                        <th style="padding:10px 12px; border:1px solid #7c3aed; text-align:center; width:15%;">Status</th>

    // ============================================================

            const title = escapeHtml(titleInput.value || 'Checklist ServiceNow');

                    </div>

                return `
                    <tr style="background:${i % 2 === 0 ? '#f9fafb' : '#ffffff'};">
                        <td style="padding:6px 10px; border:1px solid #d1d5db; text-align:center;">${i+1}</td>
                        <td style="padding:6px 10px; border:1px solid #d1d5db;">${escapeHtml(item.description)}</td>
                        <td style="padding:6px 10px; border:1px solid #d1d5db; text-align:center;"><span style="background:#e5e7eb; padding:2px 8px; border-radius:10px; font-size:11px;">${escapeHtml(item.category || 'Geral')}</span></td>
                        <td style="padding:6px 10px; border:1px solid #d1d5db; text-align:center; color:${statusColor}; font-weight:bold;">${statusText}</td>
                        <td style="padding:6px 10px; border:1px solid #d1d5db;">${escapeHtml(item.obs || '')}</td>
                        <td style="padding:6px 10px; border:1px solid #d1d5db; text-align:center;">${imagesHtml || '—'}</td>
                    </tr>
                `;
            }).join('');

            // Construção do HTML para PowerPoint
            const pptHtml = `
            <html xmlns:v="urn:schemas-microsoft-com:vml" 
                  xmlns:o="urn:schemas-microsoft-com:office:office" 
                  xmlns:p="urn:schemas-microsoft-com:office:powerpoint" 
                  xmlns="http://www.w3.org/TR/REC-html40">
            <head>
                <meta charset="utf-8">
                <title>${title}</title>
                <!--[if gte mso 9]>
                <xml>
                    <p:PowerPointDocument>
                        <p:Presentation>
                            <p:Slides>
                                <p:Slide>
                                    <p:Layout>Title</p:Layout>
                                </p:Slide>
                                <p:Slide>
                                    <p:Layout>Text</p:Layout>
                                </p:Slide>
                            </p:Slides>
                        </p:Presentation>
                    </p:PowerPointDocument>
                </xml>
                <![endif]-->
                <style>
                    body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background:#fff; }
                    .slide { width:100%; max-width:960px; margin:0 auto; page-break-after:always; padding:20px 30px; background:#fff; border-bottom:2px dashed #ccc; }
                    .slide:last-child { border-bottom:none; }
                    h1 { font-size:36px; color:#1a1a2e; text-align:center; margin-top:40px; }
                    h2 { font-size:24px; color:#8b5cf6; text-align:center; }
                    .subtitle { font-size:18px; color:#6b7280; text-align:center; margin:10px 0; }
                    .summary-box { background:#f8fafc; border-radius:12px; padding:20px; margin:20px 0; border:1px solid #e5e7eb; text-align:center; }
                    .badge { display:inline-block; padding:6px 20px; border-radius:20px; font-weight:bold; margin:0 6px; font-size:16px; }
                    .badge-success { background:#22c55e; color:#fff; }
                    .badge-pending { background:#eab308; color:#fff; }
                    table { width:100%; border-collapse:collapse; font-size:13px; margin:10px 0; }
                    th { background:#8b5cf6; color:#fff; padding:8px 10px; border:1px solid #7c3aed; text-align:center; font-weight:600; }
                    td { padding:6px 10px; border:1px solid #d1d5db; vertical-align:middle; }
                    .footer { text-align:center; margin-top:20px; padding-top:10px; border-top:1px solid #e5e7eb; color:#9ca3af; font-size:11px; }
                    .slide-title { font-size:28px; color:#1a1a2e; border-bottom:3px solid #8b5cf6; padding-bottom:10px; margin-bottom:20px; }
                </style>
            </head>
            <body>
                <!-- SLIDE 1: Capa -->
                <div class="slide">
                    <div style="display:flex; flex-direction:column; justify-content:center; min-height:400px; text-align:center;">
                        <div style="font-size:60px; margin-bottom:20px;">📋</div>
                        <h1 style="font-size:42px; color:#1a1a2e; margin:0;">${title}</h1>
                        <h2 style="font-size:24px; color:#8b5cf6; margin:10px 0;">Projeto: ${project}</h2>
                        <div style="font-size:18px; color:#6b7280; margin:20px 0;">Checklist de Verificação – Knowledge Center</div>
                        <div style="font-size:14px; color:#9ca3af; margin-top:30px;">Gerado em ${now}</div>
                    </div>
                </div>

                <!-- SLIDE 2: Resumo Executivo -->
                <div class="slide">
                    <div class="slide-title">📊 Resumo Executivo</div>
                    <div style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center; margin:30px 0;">
                        <div style="background:#f0fdf4; border:1px solid #22c55e; border-radius:12px; padding:20px 30px; text-align:center; min-width:120px;">
                            <div style="font-size:32px; font-weight:bold; color:#22c55e;">${done}</div>
                            <div style="font-size:14px; color:#22c55e;">Concluídos</div>
                        </div>
                        <div style="background:#fefce8; border:1px solid #eab308; border-radius:12px; padding:20px 30px; text-align:center; min-width:120px;">
                            <div style="font-size:32px; font-weight:bold; color:#eab308;">${total - done}</div>
                            <div style="font-size:14px; color:#eab308;">Pendentes</div>
                        </div>
                        <div style="background:#eef2ff; border:1px solid #8b5cf6; border-radius:12px; padding:20px 30px; text-align:center; min-width:120px;">
                            <div style="font-size:32px; font-weight:bold; color:#8b5cf6;">${percent}%</div>
                            <div style="font-size:14px; color:#8b5cf6;">Concluído</div>
                        </div>
                    </div>
                    <div style="background:#f8fafc; border-radius:10px; padding:15px; margin-top:20px; border:1px solid #e5e7eb;">
                        <p style="text-align:center; font-size:16px; color:#1a1a2e;">
                            <strong>Total de itens:</strong> ${total} &nbsp;|&nbsp; 
                            <span style="color:#22c55e;">✅ ${done} concluídos</span> &nbsp;|&nbsp; 
                            <span style="color:#eab308;">⏳ ${total - done} pendentes</span>
                        </p>
                    </div>
                </div>

                <!-- SLIDE 3: Lista de Itens -->
                <div class="slide">
                    <div class="slide-title">📋 Detalhamento dos Itens</div>

                        <thead><tr>
                            <th style="width:5%;">#</th>
                            <th style="width:22%;">Item</th>
                            <th style="width:15%;">Categoria</th>
                            <th style="width:15%;">Status</th>
                            <th style="width:20%;">Observação</th>
                            <th style="width:23%;">Imagens</th>
                        </tr></thead>
                        <tbody>${rowsHtml}</tbody>
                    </table>
                    <div class="footer">${title} • ServiceNow Knowledge Center</div>
                </div>
            </body>
            </html>
            `;

            const blob = new Blob([pptHtml], { type: 'application/vnd.ms-powerpoint' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${title.replace(/[^a-z0-9]/gi, '_')}.ppt`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(link.href), 5000);
        } catch (e) {
            alert('Erro ao exportar PowerPoint: ' + e.message);
        }
    }

    // ============================================================
    //  UTILITIES
    // ============================================================
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>"']/g, function(m) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return map[m];
        });
    }

    // ============================================================
    //  INIT
    // ============================================================
    (function init() {
        const loaded = loadState();
        if (!loaded || items.length === 0) {
            loadExample();
        } else {
            render();
        }
        titleInput.addEventListener('change', saveState);
        projectInput.addEventListener('change', saveState);
        document.getElementById('newItemDesc').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addItem();
        });
        document.getElementById('newItemCategory').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addItem();
        });
    })();
</script>
